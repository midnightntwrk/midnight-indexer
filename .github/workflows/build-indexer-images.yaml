name: build-indexer-images

permissions:
  contents: read

on:
  push:
    branches:
      - main
    tags:
      - v*
  workflow_dispatch:
    inputs:
      node_tag:
        description: "Node tag to use for testing (e.g., 0.13.2-rc.1)"
        required: false
        type: string

concurrency:
  group: build-indexer-images
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build and push (${{ matrix.image.name }}, ${{ matrix.platform.arch }})
    runs-on: ubuntu-latest-16-core-x64
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: chain-indexer
            description: Midnight Chain Indexer
          - name: indexer-api
            description: Midnight Indexer API
          - name: wallet-indexer
            description: Midnight Wallet Indexer
          - name: indexer-standalone
            description: Midnight Indexer
          - name: spo-indexer
            description: Midnight SPO Indexer
        # Each (image, arch) is an independent parallel job. amd64 keeps the existing (warm)
        # buildcache ref and the unsuffixed tag and builds natively, so it publishes without
        # waiting for arm64. arm64 builds in parallel under QEMU and publishes an -arm64-suffixed
        # tag, so the slow emulated build never blocks the amd64 image from being pushed.
        platform:
          - arch: amd64
            suffix: ""
            cache_scope: ""
          - arch: arm64
            suffix: "-arm64"
            cache_scope: "-arm64"
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up environment
        env:
          toolchain_toml: "rust-toolchain.toml"
        run: |
          toolchain=$(grep channel rust-toolchain.toml | sed -r 's/channel = "(.*)"/\1/')
          echo "TOOLCHAIN=$toolchain" | tee -a "$GITHUB_ENV"
          version=$(grep '^version.*=' Cargo.toml | sed -E 's/version.*=.*"(.*)"/\1/')
          echo "VERSION=$version" | tee -a "$GITHUB_ENV"

      - name: Login to DockerHub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_MIDNIGHTNTWRK_USER }}
          password: ${{ secrets.DOCKERHUB_MIDNIGHTNTWRK_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: MidnightCI
          password: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

      - name: Setup Docker Metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        env:
          DOCKER_METADATA_SHORT_SHA_LENGTH: 8
        with:
          images: |
            ghcr.io/midnight-ntwrk/${{ matrix.image.name }}
            ${{ github.ref_type == 'tag' && format('midnightntwrk/{0}', matrix.image.name) || '' }}
          flavor: |
            suffix=${{ matrix.platform.suffix }}
          tags: |
            type=semver,pattern={{version}}
            ${{ github.ref_type != 'tag' && format('type=sha,prefix={0}-,format=short', env.VERSION) || '' }}
          labels: |
            org.opencontainers.image.source=https://github.com/midnightntwrk/midnight-indexer/
            org.opencontainers.image.title=${{ matrix.image.name }}
            org.opencontainers.image.description=${{ matrix.image.description }}

      - name: Setup QEMU
        if: matrix.platform.arch == 'arm64'
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          image: tonistiigi/binfmt:qemu-v8.1.5

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build and push Docker Image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        env:
          PROFILE: ${{ startsWith(github.ref, 'refs/tags/v') && 'release' || 'dev' }}
        with:
          context: .
          file: ./${{ matrix.image.name }}/Dockerfile
          push: true
          build-args: |
            PROFILE=${{ env.PROFILE }}
            RUST_VERSION=${{ env.TOOLCHAIN }}
          platforms: linux/${{ matrix.platform.arch }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=registry,ref=ghcr.io/midnight-ntwrk/${{ matrix.image.name }}:buildcache${{ matrix.platform.cache_scope }}
            type=registry,ref=ghcr.io/midnight-ntwrk/${{ matrix.image.name }}:buildcache-${{ env.PROFILE }}${{ matrix.platform.cache_scope }}
          cache-to: |
            type=registry,ref=ghcr.io/midnight-ntwrk/${{ matrix.image.name }}:buildcache${{ matrix.platform.cache_scope }},mode=max
            type=registry,ref=ghcr.io/midnight-ntwrk/${{ matrix.image.name }}:buildcache-${{ env.PROFILE }}${{ matrix.platform.cache_scope }},mode=max

  docker-compose-validation:
    name: Docker Compose Validation
    needs: build-and-push
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        profile: [cloud, standalone]
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Docker versions
        run: |
          docker version
          docker compose version

      - name: Set up environment
        run: |
          version=$(grep '^version.*=' Cargo.toml | sed -E 's/version.*=.*"(.*)"/\1/')
          echo "VERSION=$version" | tee -a "$GITHUB_ENV"

      - name: Validate Docker Compose syntax
        run: |
          echo "Validating Docker Compose syntax for ${{ matrix.profile }} profile..."
          docker compose --profile ${{ matrix.profile }} config --quiet
          echo "Docker Compose syntax validation completed successfully"

      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: MidnightCI
          password: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

      - name: Setup Docker Metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        env:
          DOCKER_METADATA_SHORT_SHA_LENGTH: 8
        with:
          tags: |
            type=semver,pattern={{version}}
            ${{ github.ref_type != 'tag' && format('type=sha,prefix={0}-,format=short', env.VERSION) || '' }}

      - name: Set up Indexer Tag to target
        run: |
          echo "Raw tags output: ${{ steps.meta.outputs.tags }}"

          # Filter "latest" for release tags
          INDEXER_TAG=$(echo "${{ steps.meta.outputs.tags }}" | grep -v '^$' | grep -v '^latest$' | head -n1)

          if [ -z "$INDEXER_TAG" ]; then
            echo "Failed to extract INDEXER_TAG from tags output"
            echo "Available tags:"
            echo "${{ steps.meta.outputs.tags }}"
            exit 1
          fi

          echo "Using INDEXER_TAG=$INDEXER_TAG"
          echo "INDEXER_TAG=$INDEXER_TAG" >> "$GITHUB_ENV"

      - name: Set up Node Tag to target
        env:
          NODE_TAG_INPUT: ${{ github.event.inputs.node_tag }}
        run: |
          # Use workflow dispatch input if provided, otherwise read from NODE_VERSIONS file
          if [ -n "$NODE_TAG_INPUT" ]; then
            echo "Using node tag from workflow dispatch: $NODE_TAG_INPUT"
            echo "NODE_TAG=$NODE_TAG_INPUT" >> "$GITHUB_ENV"
          else
            echo "Reading node tag from NODE_VERSIONS file..."
            node_tag=$(tail -n 1 NODE_VERSIONS)
            echo "Using node tag: $node_tag"
            echo "NODE_TAG=$node_tag" >> "$GITHUB_ENV"
          fi

      - name: Set image registry
        run: |
          if [ "${{ github.ref_type }}" != "tag" ]; then
            echo "IMAGE_REGISTRY=ghcr.io/midnight-ntwrk" >> "$GITHUB_ENV"
          fi

      - name: Init Env Vars
        uses: ./.github/actions/init-env

      - name: Docker Compose Up
        run: |
          echo "Compose up with:"
          echo "- Indexer tag: $INDEXER_TAG"
          echo "- Node tag   : $NODE_TAG"
          echo "- Registry   : ${IMAGE_REGISTRY:-midnightntwrk}"
          docker compose --profile "${{ matrix.profile }}" up -d

      - name: Show running containers
        run: docker compose ps

      - name: Wait for services to be healthy
        run: |
          # Wait for up to 60 seconds for all healthchecks to pass
          for i in $(seq 1 12); do
            echo "Check for services to be healthy... attempt $i"
            unhealthy=$(docker compose ps |grep -E 'unhealthy|starting' || true)
            if [ -z "$unhealthy" ]; then
              echo "All services healthy!"
              exit 0
            else
              echo "Unhealthy services: $unhealthy"
            fi
            sleep 5
          done
          echo "Some services failed to become healthy:"
          exit 1

      - name: Show logs (on failure)
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
