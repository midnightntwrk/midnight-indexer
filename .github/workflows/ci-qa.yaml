name: ci-qa

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main
      - feat/*
      - release/*
    paths:
      - qa/**
      - .github/workflows/ci-qa.yaml
  workflow_dispatch:

concurrency:
  group: ${{github.workflow}}-${{github.head_ref || github.run_id}}
  cancel-in-progress: true

jobs:
  qa-tests:
    name: qa/tests — lint, format, audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: qa/tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js v22.x
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22.x

      - name: Restore Yarn cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            qa/tests/.yarn/cache
            qa/tests/.yarn/install-state.gz
          key: ${{runner.os}}-yarn-${{hashFiles('qa/tests/yarn.lock')}}
          restore-keys: |
            ${{runner.os}}-yarn-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint
        run: yarn lint

      - name: Format check
        run: yarn format:check

      - name: Audit
        run: yarn audit

  block-scanner:
    name: qa/tools/block-scanner — format, audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: qa/tools/block-scanner
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format check
        run: bun run format:check

      - name: Audit
        run: bun run audit

  scripts:
    name: qa/scripts — shellcheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # 2.0.0
        with:
          scandir: ./qa/scripts
          # Pre-existing scripts carry style/warning findings. Start with
          # `error` to gate real bugs; tighten in a follow-up cleanup.
          severity: error
