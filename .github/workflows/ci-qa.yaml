name: ci-qa

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main
      - feat/*
      - release/*
    paths:
      - qa/**
      - .github/workflows/ci-qa.yaml
  workflow_dispatch:

concurrency:
  group: ${{github.workflow}}-${{github.head_ref || github.run_id}}
  cancel-in-progress: true

jobs:
  qa-tests:
    name: tests — lint, format, audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: qa/tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Audit
        run: bun run audit

  block-scanner:
    name: tools/block-scanner — lint, format, audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: qa/tools/block-scanner
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (typecheck)
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Audit
        run: bun run audit

  scripts:
    name: scripts — shellcheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # 2.0.0
        with:
          scandir: ./qa/scripts
          # Pre-existing scripts carry style/warning findings. Start with
          # `error` to gate real bugs; tighten in a follow-up cleanup.
          severity: error
