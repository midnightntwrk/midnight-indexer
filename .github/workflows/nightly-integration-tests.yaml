name: nightly integration ts-tests - integrated envs

on:
  workflow_dispatch:
    inputs:
      deployment:
        type: choice
        description: Midnight deployment to use
        required: true
        default: qanet
        options:
          - nodedev01
          - qanet
          - testnet
          - testnet02
      ref:
        type: string
        description: Git ref
        required: false
        default: main
      allure_report_project_id:
        type: choice
        description: Allure project id to use
        required: true
        default: indexer-it-qanet
        options:
          - indexer-it-node-dev-01
          - indexer-it-qanet
          - indexer-it-testnet
          - indexer-it-testnet02
  workflow_call:
    inputs:
      deployment:
        type: string
        description: Midnight deployment to use (nodedev01/qanet/testnet/testnet02)
        required: true
        default: qanet
      ref:
        type: string
        description: Git ref
        required: false
      allure_report_project_id:
        type: string
        description: Allure project id to use (indexer-testnet/indexer-qanet/indexer-node-dev-01)
        required: true
        default: indexer-it-qanet
    secrets:
      MIDNIGHTCI_PACKAGES_WRITE:
        required: true

jobs:
  integration-tests:
    env:
      ENV_TYPE: ${{ inputs.deployment || 'qanet' }}
      GITHUB_TOKEN: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}
      POSTGRES_PASSWORD: ${{ secrets.APP__INFRA__STORAGE__PASSWORD }}
      ALLURE_ADMIN_USER: ${{ secrets.ALLURE_ADMIN_USER }}
      ALLURE_ADMIN_PASSWORD: ${{ secrets.ALLURE_ADMIN_PASSWORD }}
      NODE_AUTH_TOKEN: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}
      APP__INFRA__PUB_SUB__PASSWORD: ${{ secrets.APP__INFRA__PUB_SUB__PASSWORD }}
      APP__INFRA__SECRET: ${{ secrets.APP__INFRA__PUB_SUB__PASSWORD }}
      APP__INFRA__STORAGE__PASSWORD: ${{ secrets.APP__INFRA__STORAGE__PASSWORD }}
      APP__INFRA__ZSWAP_STATE_STORAGE__PASSWORD: ${{ secrets.APP__INFRA__ZSWAP_STATE_STORAGE__PASSWORD }}
    name: Integration tests
    runs-on: ubuntu-latest-8-core-x64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: https://ghcr.io
          username: MidnightCI
          password: ${{ secrets.MIDNIGHTCI_PACKAGES_READ }}

      - name: Yarn install and build contract
        run: yarn install && yarn compact
        working-directory: ts-tests

      - name: Run integration tests
        run: yarn integrated_env_tests
        working-directory: ts-tests

      - name: Upload Integration Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-reports
          path: ./ts-tests/reports/jest/testResults.xml

      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-logs
          path: |
            ./ts-tests/logs
            ./ts-tests/utils/logs

      - name: Send Results to Allure Server
        uses: robkatona/send-allure-results@v1.0.5
        if: ${{ always() }}
        with:
          allure-server-url: https://allure-server.prd.midnight.tools
          allure-results-directory: ts-tests/reports/allure-results
          project-id: ${{ inputs.allure_report_project_id }}
          security-user: ${{ secrets.ALLURE_ADMIN_USER }}
          security-pass: ${{ secrets.ALLURE_ADMIN_PASSWORD }}

  publish-tests-reports:
    name: Publish test reports
    runs-on: ubuntu-latest-8-core-x64
    if: always()
    needs: [integration-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Download Integration Test Reports
        uses: actions/download-artifact@v4
        with:
          name: integration-test-reports
          path: ./ts-tests/reports/jest/

      - name: Publish Integration Test Report
        uses: dorny/test-reporter@v1
        with:
          name: Jest Tests Report
          path: ./ts-tests/reports/jest/testResults.xml
          reporter: jest-junit
          fail-on-error: false
