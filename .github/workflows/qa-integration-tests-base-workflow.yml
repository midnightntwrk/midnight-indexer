name: Indexer QA Integration Tests Base workflow

# Note this is the base workflow used by the other
# qa-integration-tests-<environment>.yml workflows

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      target_env:
        type: choice
        description: Midnight target environment (devnet/qanet/preview/preprod)
        required: true
        default: qanet
        options:
          - devnet
          - qanet
          - preview
          - preprod
      publish_to_xray:
        type: boolean
        description: Publish the test results to Xray
        required: false
        default: false
      ref:
        type: string
        description: Git ref
        required: false
        default: main
      node_tag:
        type: string
        required: true
        description: Node ta
        default: latest
      indexer_tag:
        type: string
        required: true
        description: Indexer tag
        default: latest
  workflow_call:
    inputs:
      target_env:
        type: string
        description: Midnight target environment (devnet/qanet/preview/preprod)
        required: true
        default: qanet
      ref:
        type: string
        description: Git ref
        required: false
      publish_to_xray:
        type: boolean
        description: Publish the test results to Xray
        required: false
        default: false
      node_tag:
        type: string
        description: Node tag
        required: false
        default: latest
      indexer_tag:
        type: string
        description: Indexer tag
        required: false
        default: latest
    secrets:
      MIDNIGHTCI_PACKAGES_READ:
        required: true
      APP__INFRA__SECRET:
        required: false
      APP__INFRA__STORAGE__PASSWORD:
        required: false
      APP__INFRA__PUB_SUB__PASSWORD:
        required: false
      APP__INFRA__LEDGER_STATE_STORAGE__PASSWORD:
        required: false
      XRAY_CLIENT_ID:
        required: false
      XRAY_CLIENT_SECRET:
        required: false

concurrency:
  group: ${{github.workflow}}-${{github.head_ref || github.run_id}}
  cancel-in-progress: true

jobs:
  basic-integration-tests:
    name: Execute basic integration tests
    permissions:
      packages: read
    env:
      TARGET_ENV: ${{ inputs.target_env }}
      GITHUB_TOKEN: ${{ secrets.MIDNIGHTCI_PACKAGES_READ }}
      NODE_AUTH_TOKEN: ${{ secrets.MIDNIGHTCI_PACKAGES_READ }}
      LOG_LEVEL: DEBUG
      XRAY_COMPONENT: "indexer"
      XRAY_PROJECT_KEY: "PM"
      XRAY_TEST_PLAN_KEY: "PM-19197"
      XRAY_REPORT_TESTS_MISSING_METADATA: "false"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v 7.0.0
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup Node.js v22.x
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22.x

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee #v4.2.0
        with:
          registry: ghcr.io
          username: MidnightCI
          password: ${{ secrets.MIDNIGHTCI_PACKAGES_READ }}

      - name: Startup local environment
        if: inputs.target_env == 'undeployed'
        env:
          NODE_TAG: ${{ inputs.node_tag }}
          INDEXER_TAG: ${{ inputs.indexer_tag }}
          APP__INFRA__SECRET: ${{ secrets.APP__INFRA__SECRET }}
          APP__INFRA__STORAGE__PASSWORD: ${{ secrets.APP__INFRA__STORAGE__PASSWORD }}
          APP__INFRA__PUB_SUB__PASSWORD: ${{ secrets.APP__INFRA__PUB_SUB__PASSWORD }}
        run: |
          . ./.envrc
          echo "NODE_TAG: $NODE_TAG"
          echo "INDEXER_TAG: $INDEXER_TAG"
          bash ./qa/scripts/startup-localenv-with-data.sh

      - name: Install dependencies
        working-directory: qa/tests
        run: bun install --frozen-lockfile

      - name: Run smoke tests
        working-directory: qa/tests
        run: bun run test smoke

      - name: Run integration tests
        working-directory: qa/tests
        run: bun run test integration

      - name: Generate API coverage report (non-blocking)
        if: always()
        continue-on-error: true
        working-directory: qa/tests
        run: |
          bun run coverage:generate --target-env=${{ inputs.target_env }} --indexer-api-version=v4

      - name: Publish to Xray
        if: always() && inputs.publish_to_xray == true
        uses: GiuseppeSalvatoreShielded/TestActions/xray-upload@e5cf0c100e61b96f5bc73963312fc8064d7b2d2d
        with:
          test_results_path: ./qa/tests/reports/xray/test-results.json
          xray_client_id: ${{ secrets.XRAY_CLIENT_ID }}
          xray_client_secret: ${{ secrets.XRAY_CLIENT_SECRET }}

      - name: Upload Integration Test Reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: junit-integration-test-reports
          path: ./qa/tests/reports/custom-junit-report.xml
          if-no-files-found: warn

      - name: Upload XRay Test Reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: xray-integration-test-reports
          path: ./qa/tests/reports/xray/test-results.json
          if-no-files-found: warn

      - name: Upload logs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: qa-integration-tests-${{ inputs.target_env }}-logs
          path: |
            ./qa/tests/logs

      - name: Upload API coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: qa-api-coverage-${{ inputs.target_env }}
          path: ./qa/tests/coverage/output/**
          if-no-files-found: warn
