name: Indexer QA Ledger Event Subscription Test Base Workflow

on:
  workflow_call:
    inputs:
      target_env:
        description: 'Midnight target environment (devnet/qanet/preview/preprod)'
        required: true
        type: string
        default: qanet
      node_version:
        description: 'Node.js version to use'
        required: false
        type: string
        default: '22'
      indexer_api_version:
        description: 'Indexer API version (e.g. v4)'
        required: false
        type: string
        default: 'v4'

# no top level default permissions for security reasons
permissions:
  contents: read

jobs:
  test:
    name: Test - ledger-events
    runs-on: ubuntu-latest
    container:
      image: node:${{ inputs.node_version }}
      options: --user root
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock
    defaults:
      run:
        working-directory: qa/tests
    env:
      TARGET_ENV: ${{ inputs.target_env }}
      INDEXER_API_VERSION: ${{ inputs.indexer_api_version }}
      LOG_LEVEL: DEBUG
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test:integration ledger

      - name: Generate API coverage report (non-blocking)
        if: always()
        continue-on-error: true
        run: |
          bun run coverage:generate --target-env=${{ inputs.target_env }} --indexer-api-version=${{ inputs.indexer_api_version }}

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: test-reports-ledger-events
          path: qa/tests/reports/**
          retention-days: 7

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: test-logs-ledger-events
          path: qa/tests/logs/**
          retention-days: 7

      - name: Upload API coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: qa-api-coverage-ledger-events
          path: qa/tests/coverage/output/**
          retention-days: 7
