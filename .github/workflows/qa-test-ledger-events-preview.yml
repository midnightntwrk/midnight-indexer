name: Indexer QA Ledger Event Subscription Test (Preview)

on:
  workflow_dispatch:
  schedule:
    # Every 10 minutes on workdays (Mon-Fri), covering UK and US working hours (07:00-21:00 UTC)
    - cron: '*/10 7-21 * * 1-5'

# no top level default permissions for security reasons
permissions:
  contents: read

jobs:
  test-ledger-events:
    name: Test Ledger Events
    uses: ./.github/workflows/qa-test-ledger-events-base-workflow.yml
    with:
      target_env: preview
      indexer_api_version: v4
