name: rust-security-scan

# NOTE: This workflow uses 'pull_request' event (not 'pull_request_target') because we need to
# checkout and scan the PR code. This means fork PRs don't have access to secrets.
# We cannot use 'pull_request_target' because that would be unsafe - it would give untrusted
# fork PR code access to secrets.
#
# Fork PR behavior:
# - cargo-deny runs successfully (no secrets needed)
# - SARIF uploads to GitHub Security (no secrets needed)
# - netrc is skipped (requires secrets)
#
# This is acceptable because fork PRs still get security scanning via cargo-deny.

permissions:
  contents: read
  security-events: write # required for SARIF upload

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust-security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install cargo-deny
        uses: taiki-e/install-action@5f57d6cb7cd20b14a8a27f522884c4bc8a187458 # v2.75.19
        with:
          tool: cargo-deny

      # Skip for fork PRs (no secrets available)
      - name: Add github.com credentials to netrc
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: extractions/netrc@c3879108aae6b4ed5c4eb60854ae04f06d2f2f68 # v3.0.0
        with:
          machine: github.com
          username: MidnightCI
          password: ${{ secrets.MIDNIGHTCI_REPO }}

      - name: Run cargo-deny
        # cargo-deny 0.19.0+ includes fix for empty locations in SARIF output
        # shell: bash forces `bash --noprofile --norc -eo pipefail`, so the
        # pipeline propagates cargo-deny's exit code instead of `tee`'s.
        # Without pipefail, cargo-deny advisory failures are silently swallowed.
        shell: bash
        run: cargo deny -f sarif check -Aduplicate -Aunmaintained -Alicense-not-encountered -Aparse-error -Asource-not-allowed -Aunlicensed | tee scan.sarif
        # TODO: once everything's open sourced remove -Aunlicensed

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@7273f08caa1dcf2c2837f362f1982de0ab4dc344
        with:
          sarif_file: scan.sarif
