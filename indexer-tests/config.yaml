run_migrations: true
network_id: &network_id "Undeployed"

application:
  network_id: *network_id
  # chain-indexer
  blocks_buffer: 10
  save_zswap_state_after: 10
  caught_up_max_distance: 10
  caught_up_leeway: 5
  # wallet-indexer
  active_wallets_repeat_delay: "100ms"
  active_wallets_ttl: "30m"
  transaction_batch_size: 10
  # Number of cores by default.
  # parallelism:

infra:
  # chain-indexer
  node:
    # url: "ws://localhost:9944"
    reconnect_max_delay: "10s" # 10ms, 100ms, 1s, 10s
    reconnect_max_attempts: 30 # Roughly 5m

  # indexer-api
  api:
    address: "0.0.0.0"
    port: 8088
    request_body_limit: "1MiB"
    max_complexity: 200
    max_depth: 15
    network_id: *network_id

  zswap_state_storage:
    url: "localhost:4222"
    username: "indexer"

  storage:
    host: "localhost"
    port: 5432
    dbname: "indexer"
    user: "indexer"
    sslmode: "prefer"

  pub_sub:
    url: "localhost:4222"
    username: "indexer"

telemetry:
  tracing:
    enabled: false
    service_name: "chain-indexer"
    otlp_exporter_endpoint: "http://localhost:4317"
  metrics:
    enabled: false
    address: "0.0.0.0"
    port: 9000
