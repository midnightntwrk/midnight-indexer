[package]
name = "midnight-zswap"
edition = "2024"
version = "9.0.0"
license = "Apache-2.0"
repository = "https://github.com/midnightntwrk/midnight-ledger"
description = "Implementation of the Zswap shielded token atomic swap mechanism."

# TEMPORARY vendored copy of zswap from the `ledger-9.0.1.0-rc.1` tag, with ONLY
# this manifest modified (sources are verbatim). Why: the ledger crate's
# internal `zswap = { path = "../zswap" }` dependency does not set
# `default-features = false`, so zswap's default `proof-verifying` feature (and
# with it midnight-zkir) is always enabled. zkir carries exact registry pins for
# its backwards-compatible v1 proving pipeline (`midnight-transient-crypto
# =2.0.1`, `midnight-serialize =1.0.0`) which conflict with the v8 ledger stack
# (onchain-vm 3.1.0 needs transient-crypto 2.1.0). The indexer never verifies
# proofs (it consumes finalized blocks), so this copy makes `proof-verifying` a
# no-op and drops the zkir dependency. Remove once the ledger publishes a tag
# whose ledger->zswap edge sets `default-features = false` (reported to the
# ledger team).
#
# Manifest changes vs the tag:
# - license/repository: workspace inheritance replaced with concrete values.
# - `proof-verifying = ["dep:zkir_v2"]` -> `proof-verifying = []`; `zkir_v2`
#   dependency removed.
# - Internal `path = "../x"` dependencies -> `git` + `tag` references to the
#   same `ledger-9.0.1.0-rc.1` source, so all types stay identical to the rest
#   of the v9 tree.
# - dev-dependencies and bench target dropped (not built as a dependency).

[features]
default = []
# Kept as a no-op so the ledger crate's `proof-verifying = ["zswap/proof-verifying", ...]`
# feature mapping still resolves; the indexer never enables it.
proof-verifying = []

[dependencies]
base-crypto = { version = "1.1.0", git = "https://github.com/midnightntwrk/midnight-ledger", tag = "ledger-9.0.1.0-rc.1", package = "midnight-base-crypto" }
transient-crypto = { version = "3.0.0", git = "https://github.com/midnightntwrk/midnight-ledger", tag = "ledger-9.0.1.0-rc.1", package = "midnight-transient-crypto" }
coin-structure = { version = "2.1.0", git = "https://github.com/midnightntwrk/midnight-ledger", tag = "ledger-9.0.1.0-rc.1", package = "midnight-coin-structure" }
storage = { version = "2.0.0", git = "https://github.com/midnightntwrk/midnight-ledger", tag = "ledger-9.0.1.0-rc.1", package = "midnight-storage" }
serialize = { version = "1.0.0", git = "https://github.com/midnightntwrk/midnight-ledger", tag = "ledger-9.0.1.0-rc.1", package = "midnight-serialize" }
midnight-onchain-runtime = { version = "4.0.0", git = "https://github.com/midnightntwrk/midnight-ledger", tag = "ledger-9.0.1.0-rc.1", package = "midnight-onchain-runtime", features = [ "vendored" ] }
midnight-ledger-static = { version = "9.0.0", git = "https://github.com/midnightntwrk/midnight-ledger", tag = "ledger-9.0.1.0-rc.1", package = "midnight-ledger-static" }

# rand 0.9.0 is not yet supported by some of our dependencies, we will
# stick with 0.8.0 for now.
rand = { version = "^0.8.4", features = ["getrandom"] }
is_sorted = "^0.1.1"
lazy_static = "^1.5.0"
tracing = { version = "^0.1.41" }
itertools = "^0.14.0"
zeroize = "^1.8.0"

fake = { version = "^2.10.0", features = ["derive"] }
futures = { version = "^0.3.31" }
serde = { version = "^1.0.219", features = ["derive"] }
derive-where = "^1.6.1"
